<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="./css/style.css">
   <title>Gmail</title>
</head>
<body>

   <!-- Page Container -->
   <div class="container">

      <!-- Header with Img + Span -->
      <header class="padding border-bottom">
         <img src="./img/gmail.jpg" alt="logo gmail">
         <span class="big">Gmail</span>
      </header>
      <!-- END Header -->

      <!-- Main with 2 Sections -->
      <main>

         <!-- #1 Section Search -->
         <section class="padding border-bottom">
            <input type="text" placeholder="Search">
            <button>VAI</button>
            <div class="unread big">
               You have <span class="thirty">30</span> unread
            </div>
         </section>
         <!-- END #1 Section -->

         <!-- #2 Section Mails -->
         <section class="padding border-bottom">

            <!-- #1 Row -->
            <div class="border grey">
               <input type="checkbox">
               <span class="mail-object">Oggetto della email</span>
               <span class="mail-text">- testo della email...</span>
            </div>

            <!-- #2 Row -->
            <div class="border white">
               <input type="checkbox">
               <span class="mail-object">Oggetto della email</span>
               <span class="mail-text">- testo della email...</span>
            </div>

            <!-- #3 Row -->
            <div class="border grey">
               <input type="checkbox">
               <span class="mail-object">Oggetto della email</span>
               <span class="mail-text">- testo della email...</span>
            </div>

            <!-- #4 Row -->
            <div class="border grey">
               <input type="checkbox">
               <span class="mail-object">Oggetto della email</span>
               <span class="mail-text">- testo della email...</span>
            </div>
         </section>
         <!-- END #2 Section -->
      </main>
      <!-- END Main -->

      <!-- Footer -->
      <footer class="padding">
         <span class="big">GMail</span> <em>powered by Francesco</em>
      </footer>
      <!-- END Footer -->
   </div>
   <!-- END Page Container -->

</body>
</html>
